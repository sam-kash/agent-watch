version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentwatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agentwatch
    ports:
      - "5432:5432"
    volumes:
      - agentwatch-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentwatch"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: agentwatch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - agentwatch-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  agentwatch-postgres-data:
  agentwatch-redis-data:
